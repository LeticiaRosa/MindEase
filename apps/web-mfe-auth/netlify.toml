[build]
  command    = "cd ../.. && pnpm install --frozen-lockfile && pnpm turbo run build --filter=web-mfe-auth"
  publish    = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
